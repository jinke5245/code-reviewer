test:node:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key: pnpm-$CI_COMMIT_REF_SLUG
    fallback_keys:
      - pnpm-$CI_DEFAULT_BRANCH
    paths:
      - $PNPM_STORE_PATH
  before_script:
    - corepack enable
    - pnpm config set store-dir $PNPM_STORE_PATH
    - pnpm install --frozen-lockfile
  script:
    - pnpm run typecheck
    - pnpm exec vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=coverage/junit.xml
  coverage: '/All files\s*\|\s*([\d.]+)\s*\|/'
  artifacts:
    when: always
    reports:
      junit: coverage/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never
